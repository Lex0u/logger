name: 🐛 Bug report
description: Signaler un comportement anormal du logger
labels: ["bug"]
body:
  - type: dropdown
    id: component
    attributes:
      label: Composant concerné
      options:
        - Console
        - File
        - Discord
        - Core (Logger.ts)
        - Autre / ne sais pas
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description du bug
      description: Qu'est-ce qui ne fonctionne pas ?
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Étapes de reproduction
      description: Extrait de code minimal permettant de reproduire le bug
      render: typescript
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Comportement attendu
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version de @lex0u/logger
      placeholder: "1.2.0"
    validations:
      required: true

  - type: input
    id: node
    attributes:
      label: Version de Node.js
      placeholder: "20.11.0"
    validations:
      required: true
